# ── font ──────────────────────────────────────────────────────────────
font_family       IBM Plex Mono
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         15
disable_ligatures cursor
modify_font       cell_height 110%

# ── cursor ────────────────────────────────────────────────────────────
cursor_shape          beam
cursor_beam_thickness 1.6
cursor_blink_interval 0.5
cursor_stop_blinking_after 8.0

# ── scrollback ────────────────────────────────────────────────────────
scrollback_lines               20000
scrollback_pager_history_size  64
scrollback_fill_enlarged_window yes

# ── mouse ─────────────────────────────────────────────────────────────
copy_on_select          clipboard
strip_trailing_spaces   smart
mouse_hide_wait         2.0
detect_urls             yes
url_style               curly
show_hyperlink_targets  yes

# ── bell ──────────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.05
window_alert_on_bell yes

# ── window ────────────────────────────────────────────────────────────
remember_window_size  no
initial_window_width  120c
initial_window_height 32c
window_padding_width  8
hide_window_decorations         no
confirm_os_window_close         0
placement_strategy              center
window_resize_step_cells        2
window_resize_step_lines        2
enabled_layouts                 splits,stack,tall

# ── tabs (top) ────────────────────────────────────────────────────────
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    1
tab_activity_symbol "● "
tab_title_template  "{fmt.fg._1c1c1c}{index}: {title}"
active_tab_title_template "{fmt.fg._fcfcfc}{index}: {title}"
tab_bar_margin_height 0 0

# ── shell / behavior ──────────────────────────────────────────────────
shell_integration       enabled
allow_remote_control    socket-only
listen_on               unix:@kitty
update_check_interval   0
clipboard_control       write-clipboard write-primary read-clipboard-ask read-primary-ask
allow_hyperlinks        yes
term                    xterm-kitty

# ── performance ───────────────────────────────────────────────────────
repaint_delay  8
input_delay    2
sync_to_monitor yes

# ── keymaps ───────────────────────────────────────────────────────────
# tabs (single Alt modifier — no Shift required)
map alt+t        new_tab_with_cwd
map alt+w        close_tab
map alt+]        next_tab
map alt+[        previous_tab
map alt+shift+]  move_tab_forward
map alt+shift+[  move_tab_backward
map alt+r        set_tab_title
map alt+1        goto_tab 1
map alt+2        goto_tab 2
map alt+3        goto_tab 3
map alt+4        goto_tab 4
map alt+5        goto_tab 5
map alt+6        goto_tab 6
map alt+7        goto_tab 7
map alt+8        goto_tab 8
map alt+9        goto_tab 9

# windows / panes
map alt+enter    new_window_with_cwd
map alt+x        close_window
map alt+\        launch --location=vsplit --cwd=current
map alt+-        launch --location=hsplit --cwd=current
map alt+z        toggle_layout stack
map alt+left     neighboring_window left
map alt+right    neighboring_window right
map alt+up       neighboring_window up
map alt+down     neighboring_window down

# font sizing
map ctrl+equal     change_font_size all +1.0
map ctrl+minus     change_font_size all -1.0
map ctrl+0         change_font_size all 0

# scrollback / hints
map ctrl+shift+h        show_scrollback
map ctrl+shift+g        show_last_command_output
map ctrl+shift+e        kitten hints
map ctrl+shift+p>f      kitten hints --type path --program -
map ctrl+shift+p>l      kitten hints --type line --program -
map ctrl+shift+p>w      kitten hints --type word --program -
map ctrl+shift+p>h      kitten hints --type hash --program -

# misc
map ctrl+shift+u        kitten unicode_input
map ctrl+shift+f5       load_config_file
map ctrl+shift+escape   kitten kitty_shell window

# ── theme ─────────────────────────────────────────────────────────────
# BEGIN_KITTY_THEME
# Adwaita darker
include current-theme.conf
# END_KITTY_THEME
