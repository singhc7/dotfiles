# eza theme configuration
# This file defines the colors and styles for eza.

filekinds:
  directory: { foreground: Blue, is_bold: true }
  symlink: { foreground: Cyan }
  executable: { foreground: Green, is_bold: true }
  pipe: { foreground: Yellow }
  socket: { foreground: Red }
  block_device: { foreground: Magenta }
  char_device: { foreground: Magenta }

perms:
  user_read: { foreground: Yellow }
  user_write: { foreground: Red, is_bold: true }
  user_execute: { foreground: Green, is_bold: true }
  group_read: { foreground: Yellow }
  group_write: { foreground: Red }
  group_execute: { foreground: Green }
  other_read: { foreground: Yellow }
  other_write: { foreground: Red }
  other_execute: { foreground: Green }
  special_user_file: { foreground: Magenta }
  special_other_file: { foreground: Magenta }
  attribute_set: { foreground: Cyan }

size:
  number: { foreground: White }
  unit: { foreground: 243 }

date:
  foreground: 247

git:
  new: { foreground: Green }
  modified: { foreground: Yellow }
  deleted: { foreground: Red }
  renamed: { foreground: Cyan }
  typechange: { foreground: Magenta }
  ignored: { foreground: 242 }
  conflicted: { foreground: Red, is_bold: true }

# Extensions for common file types
filenames:
  # Config files
  .gitignore: { foreground: 245 }
  .gitconfig: { foreground: 245 }
  .zshrc: { foreground: Blue }
  .bashrc: { foreground: Blue }
  package.json: { foreground: Yellow }
  Cargo.toml: { foreground: Yellow }
  go.mod: { foreground: Yellow }

extensions:
  # Archives
  zip: { foreground: Red }
  tar: { foreground: Red }
  gz: { foreground: Red }
  7z: { foreground: Red }
  rar: { foreground: Red }

  # Documents
  md: { foreground: Blue }
  pdf: { foreground: Red }
  txt: { foreground: 248 }

  # Images
  jpg: { foreground: Cyan }
  jpeg: { foreground: Cyan }
  png: { foreground: Cyan }
  svg: { foreground: Cyan }
  gif: { foreground: Cyan }

  # Programming
  py: { foreground: Yellow }
  js: { foreground: Yellow }
  ts: { foreground: Blue }
  rs: { foreground: Red }
  go: { foreground: Cyan }
  lua: { foreground: Blue }
  sh: { foreground: Green }
  zsh: { foreground: Green }
  c: { foreground: Cyan }
  cpp: { foreground: Cyan }
  h: { foreground: Cyan }
  hpp: { foreground: Cyan }
