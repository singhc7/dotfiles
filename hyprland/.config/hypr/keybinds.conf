# Keybinds — SUPER-led, vi-directional, keyboard-first.
# Modifier flags on bind:   l=locked  e=repeat  r=release  m=mouse
# bindel = works while locked + repeats; bindl = works while locked (no repeat).

$mainMod = SUPER
$terminal = kitty
$menu = wofi --show drun
$fileManager = dolphin

#############
### APPS ###
#############

bind = $mainMod, RETURN,    exec, $terminal
bind = $mainMod, SPACE,     exec, $menu
bind = $mainMod, E,         exec, $fileManager
bind = $mainMod, B,         exec, xdg-open https:// || firefox
bind = $mainMod SHIFT, V,   exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, W,         exec, hyprlock

###################
### WM CONTROL ###
###################

bind = $mainMod, C,         killactive
bind = $mainMod SHIFT, Q,   killactive
bind = $mainMod, V,         togglefloating
bind = $mainMod, F,         fullscreen, 0
bind = $mainMod SHIFT, F,   fullscreen, 1
bind = $mainMod, P,         pseudo
bind = $mainMod, J,         layoutmsg, togglesplit
bind = $mainMod SHIFT, R,   exec, hyprctl reload
bind = $mainMod SHIFT, B,   exec, pkill -USR1 waybar
bind = $mainMod SHIFT, M,   exec, hyprctl dispatch exit

#####################
### FOCUS (vi + arrows) ###
#####################

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

##################
### MOVE WINDOW ###
##################

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

####################
### RESIZE WINDOW ###
####################

binde = $mainMod CTRL, h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive,  40 0
binde = $mainMod CTRL, k, resizeactive, 0 -40
binde = $mainMod CTRL, j, resizeactive, 0  40

##################
### WORKSPACES ###
##################

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Send window silently to workspace N (don't follow focus).
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5

bind = $mainMod, TAB,       workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Scratchpad.
bind = $mainMod, S,       togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

##################
### MOUSE DRAG ###
##################

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

########################
### SCREENSHOTS ###
########################

# Region to clipboard.
bind = , Print,             exec, grim -g "$(slurp)" - | wl-copy -t image/png
# Region to file + clipboard.
bind = $mainMod, Print,     exec, f="$HOME/Pictures/Screenshots/$(date +%F_%H-%M-%S).png"; mkdir -p "$(dirname "$f")"; grim -g "$(slurp)" "$f" && wl-copy -t image/png < "$f"
# Whole screen to file + clipboard.
bind = SHIFT, Print,        exec, f="$HOME/Pictures/Screenshots/$(date +%F_%H-%M-%S).png"; mkdir -p "$(dirname "$f")"; grim "$f" && wl-copy -t image/png < "$f"

#######################
### WALLPAPER CYCLE ###
#######################

bind = $mainMod, W, exec, awww img "$(find $HOME/Pictures/awww -type f | shuf -n1)" --transition-type any

####################
### MEDIA / HW KEYS ###
####################

bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
