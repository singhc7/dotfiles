# Adwaita palette — single source of truth for Hyprland colors.
# Reference: https://gnome.pages.gitlab.gnome.org/libadwaita/doc/main/named-colors.html
#
# Usage in other hypr/*.conf files:
#   col.active_border = $adw_blue $adw_purple 45deg
# Hyprland resolves $vars at config load.

# Accents
$adw_blue   = rgba(62a0eaee)
$adw_purple = rgba(c061cbee)
$adw_green  = rgba(57e389ee)
$adw_yellow = rgba(f6d32dee)
$adw_orange = rgba(ff7800ee)
$adw_red    = rgba(e01b24ee)

# Neutrals (darker variant — matches kitty/waybar theme)
$adw_bg      = rgba(1e1e1eee)
$adw_surface = rgba(242424ee)
$adw_border  = rgba(3d3d3daa)
$adw_fg      = rgba(ffffffee)
$adw_muted   = rgba(c0bfbcaa)
