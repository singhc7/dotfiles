# Look and feel — tuned for fast, low-GPU rendering.
# Blur and drop shadows are the most expensive features in Hyprland; both disabled.

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(7aa2f7ee) rgba(9ece6aee) 45deg
    col.inactive_border = rgba(3b4261aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 6
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.23, 1, 0.32, 1
    bezier = quick,   0.15, 0, 0.1, 1

    animation = windows,     1, 3,    quick,   popin 80%
    animation = windowsOut,  1, 2,    quick,   popin 80%
    animation = border,      1, 3,    easeOut
    animation = fade,        1, 2,    quick
    animation = workspaces,  1, 3,    easeOut, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true             # variable frame rate saves power when nothing changes
    vrr = 1                # sync to content refresh when supported
    animate_manual_resizes = false
    focus_on_activate = false
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# No gaps / no rounding / no border when a workspace has exactly one tiled window.
workspace = w[tv1], gapsout:0, gapsin:0, bordersize:0, rounding:false
