# Autostart — commands that fail silently if the binary isn't installed.

# Wallpaper daemon + a random wallpaper from ~/Pictures/awww.
exec-once = awww-daemon
exec-once = sleep 1 && awww img "$(find $HOME/Pictures/awww -type f 2>/dev/null | shuf -n1)"

# Bar + notifications.
exec-once = waybar
exec-once = dunst

# Authentication prompts (sudo, keyring unlock, etc.).
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Tray icons.
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Idle daemon — schedules dim/lock/suspend; see hypridle.conf.
exec-once = hypridle

# Clipboard history — writes to a store; queried via SUPER+SHIFT+V (see keybinds).
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
