# Hypridle — idle scheduler. Launches hyprlock / DPMS / suspend.

general {
    lock_cmd = pidof hyprlock || hyprlock          # avoid spawning multiple lockers
    before_sleep_cmd = loginctl lock-session       # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on     # wake screen on resume
}

# Dim screen after 5 min.
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# Lock after 8 min.
listener {
    timeout = 480
    on-timeout = loginctl lock-session
}

# Turn off display after 10 min.
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 25 min (battery saver).
listener {
    timeout = 1500
    on-timeout = systemctl suspend
}
