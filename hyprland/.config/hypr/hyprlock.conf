# Hyprlock — screen lock. Launched by SUPER+W or by hypridle on timeout.
# Palette: Adwaita darker (mirrors hypr/colors.conf, kitty, eza, p10k).

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 6
    noise = 0.0117
    contrast = 0.9
    brightness = 0.7
}

input-field {
    monitor =
    size = 280, 42
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.4
    outer_color = rgba(98, 160, 234, 0.8)     # adw_blue
    inner_color = rgba(30, 30, 30, 0.8)       # adw_bg
    font_color = rgb(222, 221, 218)           # adw_fg light
    fade_on_empty = false
    placeholder_text = <i>Password…</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(222, 221, 218, 1.0)
    font_size = 90
    font_family = IBM Plex Sans Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %-d')"
    color = rgba(192, 191, 188, 0.9)
    font_size = 22
    font_family = IBM Plex Sans
    position = 0, 10
    halign = center
    valign = center
}
