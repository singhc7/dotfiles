# Hyprlock — screen lock. Launched by SUPER+L or by hypridle on timeout.

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 6
    noise = 0.0117
    contrast = 0.9
    brightness = 0.7
}

input-field {
    monitor =
    size = 280, 42
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.4
    outer_color = rgba(122, 162, 247, 0.8)
    inner_color = rgba(30, 30, 46, 0.8)
    font_color = rgb(200, 200, 220)
    fade_on_empty = false
    placeholder_text = <i>Password…</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(200, 200, 220, 1.0)
    font_size = 90
    font_family = IBM Plex Sans Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %-d')"
    color = rgba(180, 180, 200, 0.9)
    font_size = 22
    font_family = IBM Plex Sans
    position = 0, 10
    halign = center
    valign = center
}
