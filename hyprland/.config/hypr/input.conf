# Input — https://wiki.hypr.land/Configuring/Variables/#input

input {
    kb_layout = us
    # caps↔esc for vim; swap lalt/lwin so SUPER sits under the thumb on laptop.
    kb_options = caps:swapescape, altwin:swap_lalt_lwin

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# 3-finger horizontal swipe cycles workspaces.
gesture = 3, horizontal, workspace
