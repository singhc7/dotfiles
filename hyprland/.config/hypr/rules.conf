# Window rules — https://wiki.hypr.land/Configuring/Window-Rules/
# Hyprland 0.54+ uses the block form exclusively; no single-line shorthand.

# Apps insisting on maximize cause layout jank in a tiling WM.
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Known XWayland drag ghost windows.
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Hyprland-run window (small command runner at bottom of screen).
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Float common dialog / settings apps.
windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = yes
}
windowrule {
    name = float-nm-connection-editor
    match:class = ^(nm-connection-editor)$
    float = yes
}
windowrule {
    name = float-blueman-manager
    match:class = ^(blueman-manager)$
    float = yes
}
windowrule {
    name = float-polkit-agent
    match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
    float = yes
}
windowrule {
    name = float-common-dialogs
    match:class = ^(file_progress|confirm|dialog|download|notification|error|splash|confirmreset)$
    float = yes
}
windowrule {
    name = float-file-dialogs
    match:title = ^(Open File|Save File|Save As|Choose Files|File Upload)$
    float = yes
}

# Picture-in-picture stays on top, floats, compact size.
windowrule {
    name = pip-float
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin = yes
    size = 480 270
}

# Idle-inhibit is handled by the Wayland idle-inhibit protocol
# (mpv/vlc/firefox-video set it themselves; hypridle honours it).

# Terminals / editors: slightly dim when unfocused.
windowrule {
    name = opacity-terminals
    match:class = ^(kitty|neovide|Code)$
    opacity = 1.0 0.95
}
