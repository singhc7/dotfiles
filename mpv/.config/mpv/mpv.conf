# Global settings

# - Ui settings -
keep-open=yes
osd-on-seek=msg-bar

# - Network and cache -
# Performance: Higher cache for smooth 4K/high-bitrate streaming
cache=yes
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB
demuxer-readahead-secs=20
hr-seek=yes
# Don't wait for audio to be ready for the first frame
audio-wait-open=0.2

# - Screenshots -
# Save high-quality PNGs to your Pictures folder when you press 's'
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-png-compression=7
screenshot-directory=~/Pictures/mpv_shots

# - OSD (On Screen Display) -
# Make the UI text cleaner and the bar smaller
osd-font='Sans Serif'
osd-font-size=30
osd-bar-h=2
osd-border-size=1

# - Hardware decoding -
# Explicitly use VAAPI to stop it from looking for NVIDIA (CUDA) drivers
hwdec=vaapi
vo=gpu

# - Performance -
# Let mpv auto-select the best available (e.g. Vulkan or OpenGL)
gpu-api=auto
gpu-context=wayland

# - Audio output driver -
# Uses the modern fedora audio server directly for lower latency and better mixing
ao=pipewire

# - Youtube strict rules -
# COMMIT: Never stream AV1 (av01) on Linux. Forces VP9 or fallback to H264.
# This ensures hardware decoding (VAAPI) is always utilized for 4K.
ytdl-format="bestvideo[vcodec!=?av01]+bestaudio/best"

# Music profile
[music]

# - Core -
# Force audio only, but grab the absolute best bitrate available (usually Opus ~160k+)
ytdl-format=bestaudio/best
video=no
force-window=no

# 1. Tell mpv not to load subs even if they exist
sub=no

# 2. Tell yt-dlp to NOT even look for subtitles
ytdl-raw-options-append=no-write-sub=
ytdl-raw-options-append=no-write-auto-sub=

# - Audio tweaks -

# 1. Gapless Playback
gapless-audio=yes

# 2. High-Quality Resampling (Pro-Audio level)
# If the audio hz doesn't match the DAC/Headphones, this uses the
# high-quality 'soxr' library with higher precision.
audio-samplerate=48000
audio-channels=stereo
audio-resample-filter-size=32
audio-resample-phase-shift=10
audio-pitch-correction=yes

# 3. Volume & Normalization
# Consistent volume across different tracks/albums
replaygain=album
# Dynamic Normalization (The "Radio" Experience)
af=lavfi=[dynaudnorm=f=75:g=25:p=0.55]

# 4. Buffer Tuning for Quality (Anti-Stutter)
# Very small buffer for music to keep it responsive
cache=yes
demuxer-max-bytes=16M
demuxer-max-back-bytes=2M
demuxer-hysteresis-secs=0

# - Meta -
# Prevent album art from spawning a window (purely terminal/background use)
audio-display=no

# TELL YOUTUBE: "I am the YouTube Music android App"
ytdl-raw-options-append=extractor-args=youtube:player_client=android_music
